services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: atlas_owner
      POSTGRES_PASSWORD: atlas_owner
      POSTGRES_DB: atlas_ap
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_owner -d atlas_ap"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

