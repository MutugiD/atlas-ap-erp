name: deploy

# Manual only — never runs automatically. Requires an AWS OIDC deploy role
# (repo variable AWS_DEPLOY_ROLE_ARN) and region (AWS_REGION). See docs/deploy.md.
on:
  workflow_dispatch:
    inputs:
      prod:
        description: "Deploy with production settings (retention, deletion protection, 2 tasks)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aws
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: CDK deploy
        working-directory: infra
        run: bun run deploy -c prod=${{ inputs.prod }}
