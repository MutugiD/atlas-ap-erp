name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: atlas_owner
          POSTGRES_PASSWORD: atlas_owner
          POSTGRES_DB: atlas_ap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas_owner -d atlas_ap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: License audit
        run: bun run license:audit
      - name: Test
        run: bun test
      - name: Live Support Agent integration
        run: bun run test:live-support
        env:
          DATABASE_URL: postgresql://atlas_owner:atlas_owner@localhost:5432/atlas_ap
          REDIS_URL: redis://localhost:6379
      - name: Typecheck
        run: bun run typecheck
      - name: Support Agent build
        run: bun --filter @atlas/support-agent build
      - name: Web build
        run: bun --filter @atlas/web build
      - name: Infrastructure synth
        run: bun run infra:synth > /tmp/atlas-ap-cdk.yaml
      - name: Compose config
        run: docker compose config --quiet
      - name: Support Agent image
        run: docker build -f apps/support-agent/Dockerfile -t atlas/support-agent:ci .
