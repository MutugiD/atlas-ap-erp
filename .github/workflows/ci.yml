name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: License audit
        run: bun run license:audit
      - name: Test
        run: bun test
      - name: Typecheck
        run: bun run typecheck
      - name: Support Agent build
        run: bun --filter @atlas/support-agent build
      - name: Web build
        run: bun --filter @atlas/web build
      - name: Infrastructure synth
        run: bun run infra:synth > /tmp/atlas-ap-cdk.yaml
      - name: Compose config
        run: docker compose config --quiet
      - name: Support Agent image
        run: docker build -f apps/support-agent/Dockerfile -t atlas/support-agent:ci .
